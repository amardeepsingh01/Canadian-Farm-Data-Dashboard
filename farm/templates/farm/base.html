<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farm Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body.dark-mode {
            background-color: #121212;
            color: white;
        }

        .card {
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-light">

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">🌾 Farm Dashboard</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'farm:index' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'farm:charts' %}">Charts</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'farm:comparison' %}">Comparison</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'farm:prediction' %}">Prediction</a>
                </li>

            </ul>

            <!-- 🌙 Dark Mode Button -->
            <button onclick="toggleDark()" class="btn btn-outline-light">
                🌙
            </button>
        </div>

    </div>
</nav>

<!-- 🔷 MAIN CONTENT -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- 🔷 DARK MODE SCRIPT -->
<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
